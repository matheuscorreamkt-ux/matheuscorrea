<title>Matheus Corrêa</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080c;
  --accent:#29B6F6;
  --accent2:#00E5FF;
  --text:#e8eef2;
  --dim:rgba(232,238,242,.55);
  --line:rgba(41,182,246,.14);
  --mono:'JetBrains Mono',monospace;
}
html,body{min-height:100svh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Fundo idêntico ao site */
.scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scene-glow{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(41,182,246,.12) 0%,transparent 70%)}
.scene-glow2{position:absolute;bottom:-10%;right:-10%;width:500px;height:500px;background:radial-gradient(ellipse,rgba(0,229,255,.06) 0%,transparent 65%)}
.scene-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(41,182,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(41,182,246,.04) 1px,transparent 1px);background-size:70px 70px;mask-image:radial-gradient(ellipse 80% 100% at 50% 0%,#000 40%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 80% 100% at 50% 0%,#000 40%,transparent 100%)}
.scene-grain{position:absolute;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

.wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:56px 20px 80px;display:flex;flex-direction:column;align-items:center}

50%{opacity:.5;box-shadow:0 0 16px var(--accent2)}}

/* Perfil */
.profile{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px;text-align:center;width:100%}
.avatar-wrap{position:relative;opacity:0;animation:up .6s .1s forwards}
.avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;object-position:center top;display:block;border:2px solid rgba(41,182,246,.35);box-shadow:0 0 0 4px rgba(41,182,246,.07),0 0 24px rgba(41,182,246,.18)}
.avatar-ring{position:absolute;inset:-7px;border-radius:50%;border:1px dashed rgba(41,182,246,.22);animation:spin 18s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.profile-name{font-size:1.4rem;font-weight:800;letter-spacing:-.03em;opacity:0;animation:up .6s .17s forwards}
.profile-handle{font-family:var(--mono);font-size:.68rem;color:var(--accent);letter-spacing:.1em;opacity:0;animation:up .6s .22s forwards}
.profile-bio{font-size:.85rem;color:var(--dim);line-height:1.6;max-width:300px;opacity:0;animation:up .6s .27s forwards}

.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--line) 30%,rgba(41,182,246,.25) 50%,var(--line) 70%,transparent);margin:0 0 24px;opacity:0;animation:up .6s .32s forwards}

/* Cards — imagem completa, sem corte */
.cards{width:100%;display:flex;flex-direction:column;gap:14px}

.card{
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#05080c;
  text-decoration:none;
  display:block;
  cursor:pointer;
  line-height:0;
  transition:transform .22s cubic-bezier(.22,1,.36,1),border-color .22s,box-shadow .22s;
  opacity:0;
}
.card:hover{
  transform:translateY(-3px);
  border-color:rgba(41,182,246,.4);
  box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 0 1px rgba(41,182,246,.12);
}
.card:active{transform:scale(.985)}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,rgba(41,182,246,.06),transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.card:hover::after{opacity:1}

/* Imagem ocupa largura total, altura proporcional — sem corte */
.card-img{
  width:104%;
  margin-left:-2%;
  margin-top:-1%;
  margin-bottom:-1%;
  height:auto;
  display:block;
  vertical-align:bottom;
  filter:saturate(.88) brightness(.95);
  transition:filter .35s,transform .4s cubic-bezier(.22,1,.36,1);
}
.card:hover .card-img{
  filter:saturate(1) brightness(1);
  transform:scale(1.02);
}

/* Seta no canto inferior direito sobre a imagem */
.card-arrow{
  position:absolute;
  bottom:12px;right:12px;
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(41,182,246,.3);
  background:rgba(5,8,12,.7);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
  transition:transform .2s,border-color .2s,background .2s;
}
.card:hover .card-arrow{
  transform:translateX(2px);
  border-color:rgba(41,182,246,.6);
  background:rgba(41,182,246,.15);
}

.card:nth-child(1){animation:up .55s .38s forwards}
.card:nth-child(2){animation:up .55s .5s forwards}
.card:nth-child(3){animation:up .55s .62s forwards}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Footer */
.footer{margin-top:40px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.62rem;color:rgba(232,238,242,.18);letter-spacing:.1em;opacity:0;animation:up .6s .78s forwards}
.footer::before,.footer::after{content:'';flex:1;height:1px}
.footer::before{background:linear-gradient(90deg,transparent,rgba(41,182,246,.1))}
.footer::after{background:linear-gradient(90deg,rgba(41,182,246,.1),transparent)}

.logo-img{
  width:130px;
  height:auto;
  display:block;
  margin-bottom:36px;
  opacity:0;animation:up .6s .05s forwards;
  filter:drop-shadow(0 0 12px rgba(41,182,246,.25));
}
</style>
